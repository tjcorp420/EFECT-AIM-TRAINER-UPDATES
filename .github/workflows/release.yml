name: Deploy EFECT Updater

on:
  push:
    tags:
      - 'v*' # This tells GitHub to ONLY run this when you push a version tag (e.g., v0.1.1)

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install EFECT Dependencies
        run: npm install
        
      - name: Initialize Rust Compiler
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build, Sign, and Deploy to GitHub
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EFECT Aim Trainer ${{ github.ref_name }}'
          releaseBody: 'Automated Cloud Deployment.'
          releaseDraft: false
          prerelease: false